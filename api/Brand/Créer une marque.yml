info:
  name: Créer une marque
  type: http
  seq: 1

http:
  method: POST
  url: localhost:8080/api/brands
  body:
    type: json
    data: |-
      {
        "name": "Boss-2",
        "slug": "boss-2",
        "logoUrl": "https://example.com/logos/Boss.png"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
