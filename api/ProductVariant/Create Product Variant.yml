info:
  name: Create Product Variant
  type: http
  seq: 1

http:
  method: POST
  url: localhost:8080/api/product-variants
  body:
    type: json
    data: |-
      {
        "productId": 1,
        "sku": "CRM-200",
        "displayName": "200 ml",
        "price": 249.99,
        "stockQuantity": 20
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
