info:
  name: Créer une image produit
  type: http
  seq: 1

http:
  method: POST
  url: localhost:8080/api/product-images
  body:
    type: json
    data: |-
      {
        "productId": 1,
        "url": "https://example.com/images/product-3.jpg",
        "sortOrder":3,
        "primary": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
